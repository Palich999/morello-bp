<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Morello BP Tracker PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    padding: 15px;
}

.logo img {
    max-width: 100%;
    border-radius: 15px;
    box-shadow: 0 0 25px orange;
}

h1 { text-align:center; }

.controls {
    text-align:center;
    margin:15px 0;
}

select {
    padding:5px;
    border-radius:6px;
}

.task {
    background: rgba(255,255,255,0.1);
    margin: 6px 0;
    padding: 10px;
    border-radius: 10px;
    display:flex;
    justify-content:space-between;
}

button {
    background:#00c853;
    border:none;
    border-radius:6px;
    color:white;
    cursor:pointer;
}

.done { background:gray; }

.progress {
    height:20px;
    background:#333;
    border-radius:10px;
    margin:10px 0;
}

.progress-bar {
    height:100%;
    background:#00e676;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="logo">
<img src="logo.png">
</div>

<h1>🎮 MORELLO BP PRO</h1>

<div class="controls">
Режим:
<select id="mode" onchange="load()">
<option value="solo">🧍 Соло</option>
<option value="duo">👥 Дуо</option>
<option value="faction">🚔 Фракции</option>
</select>

VIP:
<select id="vip" onchange="load()">
<option value="no">Без VIP</option>
<option value="yes">С VIP</option>
</select>
</div>

<h3 id="bp">BP: 0</h3>

<div class="progress">
<div id="bar" class="progress-bar"></div>
</div>

<div id="tasks"></div>

<script>

// ВСЕ ЗАДАНИЯ
const tasks = {

solo: [
["Посетить любой сайт в браузере",1,2],
["Зайти в любой канал в Brawl",1,2],
["Поставить лайк в анкете Match",1,2],
["Ставка в межсерверное колесо",3,6],
["Проехать 1 станцию на метро",2,4],
["Поймать 20 рыб",4,8],
["Выполнить 2 квеста клубов",4,8],
["Починить деталь в автосервисе",1,2],
["Забросить 2 мяча в баскетболе",1,2],
["Забить 2 гола в футболе",1,2],
["Победить в дартс",1,2],
["Поиграть 1 минуту в волейбол",1,2],
["Поиграть 1 минуту в настольный теннис",1,2],
["Поиграть 1 минуту в большой теннис",1,2],
["Нули в казино",2,4],
["Успешная тренировка в тире",1,2],
["Купить лотерейный билет",1,2],
["10 действий на ферме",1,2],
["3 рейса на дальнобойщике",2,4],
["Добавить 5 видео в кинотеатре",1,2],
["Арендовать киностудию",2,4],
["25 стройки",2,4],
["25 порта",2,4],
["25 шахты",2,4],
["20 подходов в качалке",1,2],
["25 огоньков на пожарке",1,2],
["Выкопать сокровище",1,2]
],

duo: [
["Армрестлинг",1,2],
["Мафия в казино",3,6],
["3 победы в Денс Баттле",2,4],
["Победа в картинге",1,2],
["Гонка через телефон",1,2],
["Выиграть 5 игр ТК",1,2],
["Выиграть 5 игр МБА",1,2],
["Починить чужой авто",2,4]
],

faction: [
["7 граффити",1,2],
["Сдать 5 контрабанды",2,4],
["Капт Бизвар",1,2],
["Сдать хаммер",3,6],
["5 медкарт EMS",2,4],
["15 вызовов EMS",2,4],
["40 объявлений",2,4],
["15 ограблений",2,4],
["5 кодов силовых",2,4],
["Поставить авто на учет",1,2],
["1 арест КПЗ",1,2],
["Выкуп 2 человек КПЗ",2,4],
["2 аирдропа",4,8]
]

};

function load() {
    const today = new Date().toDateString();
    const mode = document.getElementById("mode").value;
    const vip = document.getElementById("vip").value;

    let data = JSON.parse(localStorage.getItem("bp")) || {};
    if (!data[today]) data[today] = {};

    let total = 0;
    let max = 0;

    const container = document.getElementById("tasks");
    container.innerHTML = "";

    tasks[mode].forEach((task, i) => {

        const key = mode+"_"+vip+"_"+i;

        const bp = (vip === "yes") ? task[2] : task[1];
        max += bp;

        const done = data[today][key];
        if (done) total += bp;

        const div = document.createElement("div");
        div.className = "task";

        const btn = document.createElement("button");
        btn.innerText = done ? "✔" : "Сделать";
        if (done) btn.classList.add("done");

        btn.onclick = () => {
            data[today][key] = !data[today][key];
            localStorage.setItem("bp", JSON.stringify(data));
            load();
        };

        div.innerHTML = `<span>${task[0]} (+${bp} BP)</span>`;
        div.appendChild(btn);
        container.appendChild(div);

    });

    document.getElementById("bp").innerText =
        `${mode.toUpperCase()} | ${vip === "yes" ? "VIP" : "NO VIP"}: ${total}/${max}`;

    document.getElementById("bar").style.width = (total/max*100)+"%";
}

load();
</script>

</body>
</html>
